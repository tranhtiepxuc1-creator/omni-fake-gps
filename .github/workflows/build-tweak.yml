name: Build iOS Tweak (.dylib)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Theos Environment
      run: |
        # Tải bộ khung biên dịch Theos gốc về thư mục cá nhân
        git clone --recursive https://github.com/theos/theos.git /Users/runner/theos

    - name: Download Pure iOS SDK from Theos Repository
      run: |
        # Tạo thư mục chứa SDK trong cấu trúc của Theos
        mkdir -p /Users/runner/theos/sdks
        
        # Tải thẳng bộ SDK iOS 14.5 bản rút gọn siêu nhẹ từ kho lưu trữ uy tín của cộng đồng
        git clone https://github.com/theos/sdks.git /tmp/sdks
        
        # Di chuyển bộ SDK chuẩn vị trí viết thường vào đúng nơi Theos cần tìm
        mv /tmp/sdks/iPhoneOS14.5.sdk /Users/runner/theos/sdks/iphoneos.sdk
        
        # Xác nhận kiểm tra xem thư mục đã sẵn sàng để biên dịch chưa
        ls -la /Users/runner/theos/sdks/iphoneos.sdk

    - name: Compile Tweak to .dylib
      run: |
        # Thực hiện lệnh đúc tweak với bộ SDK sạch sẽ, không vướng bảo mật Xcode
        make package FINALPACKAGE=1 SDKVERSION=iphoneos THEOS=/Users/runner/theos

    - name: Prepare Dylib Artifact
      run: |
        mkdir -p output
        # Tìm và trích xuất file file .dylib thành phẩm ra ngoài
        cp .theos/obj/debug/OmniFakeGPS.dylib output/ 2>/dev/null || cp obj/debug/OmniFakeGPS.dylib output/ 2>/dev/null || cp .theos/obj/OmniFakeGPS.dylib output/ 2>/dev/null
        
        # Nếu xuất ra file .deb, tiến hành giải nén lấy file .dylib bên trong
        if [ ! -f "output/OmniFakeGPS.dylib" ]; then
          dpkg-deb -x packages/*.deb output/ 2>/dev/null || true
          cp output/Library/MobileSubstrate/DynamicLibraries/OmniFakeGPS.dylib output/ 2>/dev/null || true
        fi

    - name: Upload Finished Tweak (.dylib)
      uses: actions/upload-artifact@v4
      with:
        name: OmniFakeGPS-Dylib
        path: output/OmniFakeGPS.dylib
