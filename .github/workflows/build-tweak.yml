name: Build iOS Tweak (.dylib)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Theos Environment
      run: |
        export THEOS=/Users/runner/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        echo "THEOS=$THEOS" >> $GITHUB_ENV

    - name: Clean and Link Official iOS SDK
      run: |
        # Lấy đường dẫn bộ SDK iOS chính chủ từ Xcode hệ thống
        XCODE_SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "Tìm thấy Xcode SDK tại: $XCODE_SDK_PATH"
        
        # Tạo thư mục và DỌN SẠCH các liên kết cũ để tránh lỗi "File exists"
        mkdir -p /Users/runner/theos/sdks
        rm -rf /Users/runner/theos/sdks/*
        
        # Tạo liên kết mềm sạch sẽ 100% vào Theos
        ln -s "$XCODE_SDK_PATH" /Users/runner/theos/sdks/iPhoneOS.sdk
        
        # Xác nhận danh sách SDK trong thư mục
        ls -la /Users/runner/theos/sdks/

    - name: Compile Tweak to .dylib
      run: |
        export THEOS=/Users/runner/theos
        
        # Tiến hành build tweak với môi trường SDK sạch
        make package FINALPACKAGE=1 SDKVERSION=iPhoneOS
      env:
        THEOS: /Users/runner/theos

    - name: Prepare Dylib Artifact
      run: |
        mkdir -p output
        # Tìm và sao chép file .dylib sau khi build thành công ra thư mục output
        cp .theos/obj/debug/OmniFakeGPS.dylib output/ 2>/dev/null || cp obj/debug/OmniFakeGPS.dylib output/ 2>/dev/null || cp .theos/obj/OmniFakeGPS.dylib output/ 2>/dev/null
        
        # Nếu Theos đóng gói thành file .deb, tiến hành giải nén lấy file .dylib bên trong
        if [ ! -f "output/OmniFakeGPS.dylib" ]; then
          dpkg-deb -x packages/*.deb output/ 2>/dev/null || true
          cp output/Library/MobileSubstrate/DynamicLibraries/OmniFakeGPS.dylib output/ 2>/dev/null || true
        fi

    - name: Upload Finished Tweak (.dylib)
      uses: actions/upload-artifact@v4
      with:
        name: OmniFakeGPS-Dylib
        path: output/OmniFakeGPS.dylib
